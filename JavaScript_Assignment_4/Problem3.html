<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart Management</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    button {
      margin: 5px 0;
      padding: 5px 10px;
    }
    input[type="number"] {
      width: 60px;
    }
    .output {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #333;
      max-width: 600px;
    }
    ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <h1>Shopping Cart Management</h1>

  <div>
    <button onclick="calculateTotal()">Calculate Total Cart Value</button><br>
    <input type="number" id="increaseId" placeholder="Product ID">
    <input type="number" id="increaseQty" placeholder="Qty">
    <button onclick="increaseQty()">Increase Quantity</button><br>
    <input type="number" id="removeId" placeholder="Product ID">
    <button onclick="removeProduct()">Remove Product</button><br>
    <button onclick="applyDiscount()">Apply 10% Discount (> ₹10,000)</button><br>
    <button onclick="sortByTotalPrice()">Sort Cart by Total Item Price</button><br>
    <button onclick="checkExpensive()">Any Product > ₹50,000?</button><br>
    <button onclick="checkStock()">All Items in Stock?</button><br>
    <button onclick="generateInvoice()">Generate Invoice</button><br>
    <button onclick="mostExpensive()">Most Expensive Product</button><br>
    <button onclick="calculateGST()">Calculate GST (18%)</button>
  </div>

  <h2>Output:</h2>
  <div id="output" class="output"></div>

  <script>
    let cart = [
      { id: 1, product: "Laptop", price: 60000, qty: 1 },
      { id: 2, product: "Headphones", price: 2000, qty: 2 },
      { id: 3, product: "Mouse", price: 800, qty: 1 }
    ];

    const output = document.getElementById("output");

    function displayCart() {
      let html = "<strong>Cart Items:</strong><ul>";
      cart.forEach(item => {
        html += `<li>ID ${item.id}: ${item.product} - ₹${item.price} x ${item.qty} = ₹${item.price * item.qty}</li>`;
      });
      html += "</ul>";
      output.innerHTML = html;
    }

    function calculateTotal() {
      let total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
      output.innerHTML = `<strong>Total Cart Value:</strong> ₹${total}`;
    }

    function increaseQty() {
      let id = parseInt(document.getElementById("increaseId").value);
      let qty = parseInt(document.getElementById("increaseQty").value);
      if (isNaN(id) || isNaN(qty) || qty <= 0) {
        output.innerHTML = "Enter valid Product ID and Qty.";
        return;
      }
      cart = cart.map(item => item.id === id ? { ...item, qty: item.qty + qty } : item);
      displayCart();
    }

    function removeProduct() {
      let id = parseInt(document.getElementById("removeId").value);
      if (isNaN(id)) {
        output.innerHTML = "Enter valid Product ID.";
        return;
      }
      cart = cart.filter(item => item.id !== id);
      displayCart();
    }

    function applyDiscount() {
      cart = cart.map(item => item.price > 10000 ? { ...item, price: Math.round(item.price * 0.9) } : item);
      displayCart();
    }

    function sortByTotalPrice() {
      cart.sort((a, b) => (a.price * a.qty) - (b.price * b.qty));
      displayCart();
    }

    function checkExpensive() {
      let expensive = cart.some(item => item.price > 50000);
      output.innerHTML = expensive ? "Yes, some products cost more than ₹50,000." : "No products cost more than ₹50,000.";
    }

    function checkStock() {
      let inStock = cart.every(item => item.qty > 0);
      output.innerHTML = inStock ? "All items are in stock." : "Some items are out of stock!";
    }

    function generateInvoice() {
      let invoice = cart.map(item => `${item.product}: ₹${item.price} x ${item.qty} = ₹${item.price * item.qty}`).join("<br>");
      output.innerHTML = `<strong>Invoice:</strong><br>${invoice}`;
    }

    function mostExpensive() {
      let expensive = cart.reduce((max, item) => item.price > max.price ? item : max, cart[0]);
      output.innerHTML = `<strong>Most Expensive Product:</strong> ${expensive.product} - ₹${expensive.price}`;
    }

    function calculateGST() {
      let total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
      let gst = total * 0.18;
      output.innerHTML = `<strong>Total GST (18%):</strong> ₹${gst.toFixed(2)}<br><strong>Total Amount with GST:</strong> ₹${(total + gst).toFixed(2)}`;
    }

    displayCart();
  </script>
</body>
</html>
