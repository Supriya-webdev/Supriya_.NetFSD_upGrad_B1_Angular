<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Performance Analyzer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    button {
      margin: 5px 0;
      padding: 5px 10px;
    }
    .output {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #333;
      max-width: 600px;
    }
    ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <h1>Student Performance Analyzer</h1>

  <div>
    <button onclick="showPassed()">Show Passed Students (≥ 40)</button><br>
    <button onclick="showDistinction()">Show Distinction Students (≥ 85)</button><br>
    <button onclick="classAverage()">Class Average</button><br>
    <button onclick="findTopper()">Find Topper</button><br>
    <button onclick="countFailed()">Count Failed Students</button><br>
    <button onclick="marksToGrades()">Convert Marks to Grades</button><br>
    <button onclick="showLeaderboard()">Show Leaderboard with Rank</button><br>
    <button onclick="removeLowest()">Remove Lowest Scorer</button>
  </div>

  <h2>Output:</h2>
  <div id="output" class="output"></div>

  <script>
    let students = [
      { name: "Akhil", marks: 85 },
      { name: "Priya", marks: 72 },
      { name: "Ravi", marks: 90 },
      { name: "Meena", marks: 45 },
      { name: "Karan", marks: 30 }
    ];

    const output = document.getElementById("output");

    function showPassed() {
      const passed = students.filter(s => s.marks >= 40);
      output.innerHTML = "<strong>Passed Students:</strong><ul>" + 
        passed.map(s => `<li>${s.name}: ${s.marks}</li>`).join("") + "</ul>";
    }

    function showDistinction() {
      const distinction = students.filter(s => s.marks >= 85);
      output.innerHTML = "<strong>Distinction Students:</strong><ul>" + 
        distinction.map(s => `<li>${s.name}: ${s.marks}</li>`).join("") + "</ul>";
    }

    function classAverage() {
      const avg = students.reduce((sum, s) => sum + s.marks, 0) / students.length;
      output.innerHTML = `<strong>Class Average:</strong> ${avg.toFixed(2)}`;
    }

    function findTopper() {
      const topper = students.reduce((top, s) => s.marks > top.marks ? s : top, students[0]);
      output.innerHTML = `<strong>Topper:</strong> ${topper.name} (${topper.marks})`;
    }

    function countFailed() {
      const failedCount = students.filter(s => s.marks < 40).length;
      output.innerHTML = `<strong>Failed Students:</strong> ${failedCount}`;
    }

    function marksToGrades() {
      const withGrades = students.map(s => {
        let grade;
        if (s.marks >= 75) grade = "A";
        else if (s.marks >= 60) grade = "B";
        else if (s.marks >= 40) grade = "C";
        else grade = "Fail";
        return { ...s, grade };
      });
      output.innerHTML = "<strong>Students with Grades:</strong><ul>" +
        withGrades.map(s => `<li>${s.name}: ${s.marks} → ${s.grade}</li>`).join("") +
        "</ul>";
    }

    function showLeaderboard() {
      const leaderboard = [...students]
        .sort((a, b) => b.marks - a.marks)
        .map((s, index) => ({ ...s, rank: index + 1 }));

      output.innerHTML = "<strong>Leaderboard:</strong><ul>" +
        leaderboard.map(s => `<li>Rank ${s.rank}: ${s.name} - ${s.marks}</li>`).join("") +
        "</ul>";
    }

    function removeLowest() {
      const sorted = [...students].sort((a, b) => a.marks - b.marks);
      students = sorted.slice(1); 
      output.innerHTML = "<strong>Lowest scorer removed.</strong><br>Updated Students:<ul>" +
        students.map(s => `<li>${s.name}: ${s.marks}</li>`).join("") +
        "</ul>";
    }

    output.innerHTML = "<strong>Student List:</strong><ul>" + 
      students.map(s => `<li>${s.name}: ${s.marks}</li>`).join("") + "</ul>";
  </script>
</body>
</html>
