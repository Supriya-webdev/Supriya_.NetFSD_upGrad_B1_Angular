<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Info Display</title>
</head>
<body>
  <h1>User Info Display</h1>

  <button onclick="displayUserInfo(user)">Show User Info</button>

  <div id="userInfo"></div>

  <script>
    const user = {
      name: "Rahul",
      age: 25,
      city: "Bangalore"
    };

    function displayUserInfo(userObj) {
      let content = "";

      content += "<p>Name: " + userObj.name + "</p>";
      content += "<p>Age: " + userObj.age + "</p>";
      content += "<p>City: " + userObj.city + "</p>";

      document.getElementById("userInfo").innerHTML = content;
    }
  </script>
</body>
</html>
