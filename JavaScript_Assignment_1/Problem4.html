<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic Signal Simulator</title>
</head>
<body>
  <script>
    let signalColor = "yellow"; 

    switch (signalColor.toLowerCase()) { 
      case "red":
        console.log("Stop");
        break;
      case "yellow":
        console.log("Get Ready");
        break;
      case "green":
        console.log("Go");
        break;
      default:
        console.log("Invalid signal color!");
        break;
    }
  </script>
</body>
</html>
