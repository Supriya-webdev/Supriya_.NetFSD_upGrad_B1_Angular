<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discount Calculator</title>
</head>
<body>
  <script>
    let amount = 4500;
    let discount = 0;

    if (amount >= 5000) {
      discount = amount * 0.20;
    } else if (amount >= 3000) {
      discount = amount * 0.10;
    } else {
      discount = 0;
    }

    let finalAmount = amount - discount;

    document.write("Original Amount: ₹" + amount + "<br>");
    document.write("Discount Amount: ₹" + discount + "<br>");
    document.write("Final Payable Amount: ₹" + finalAmount);
  </script>
</body>
</html>
