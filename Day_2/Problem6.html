<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Responsive Media Blog Platform with images, audio, video, and subscription form.">
  <title>Media Blog Platform</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      line-height: 1.6;
    }
    header, main, section, footer {
      max-width: 900px;
      margin: auto;
      padding: 20px;
      background-color: #fff;
    }

    header h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
    }

    input[type="search"] {
      width: 100%;
      padding: 10px;
      font-size: 1em;
      margin-bottom: 15px;
      box-sizing: border-box;
    }

    article {
      border-bottom: 1px solid #ccc;
      margin-bottom: 20px;
      padding-bottom: 20px;
    }
    article h2 {
      color: #0066cc;
      margin-bottom: 5px;
    }
    article p {
      font-size: 0.9em;
      color: #555;
    }
    article img, article video {
      max-width: 100%;
      display: block;
      margin: 10px 0;
      border-radius: 5px;
    }
    audio {
      width: 100%;
      margin: 10px 0;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    input[type="email"] {
      padding: 10px;
      font-size: 1em;
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      padding: 10px;
      font-size: 1em;
      background-color: #0066cc;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #004999;
    }

    footer {
      text-align: center;
      font-size: 0.9em;
      color: #777;
      margin-top: 20px;
    }

    @media (max-width: 600px) {
      header, main, section, footer {
        padding: 15px;
      }
      article h2 {
        font-size: 1.2em;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Media Blog Platform</h1>
  </header>

  <section>
    <input type="search" placeholder="Search articles..." disabled>
    <small>Search is static without JavaScript</small>
  </section>

  <main>
    <article>
      <h2>The Beauty of Nature</h2>
      <p>Author: Rahul | Date: 25 Feb 2026</p>
      <img src="Images\nature.jpg" alt="Nature Image">
      <audio controls loop>
        <source src="Images\u_thlvfy3fsc-birds-forrest-457845.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
      <video controls poster="Images\Naturee.jpg">
        <source src="Images\49981-459802291_medium.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </article>

    <article>
      <h2>Technology Advances</h2>
      <p>Author: Meena | Date: 24 Feb 2026</p>
      <img src="Images\ai.jpg" alt="Technology Image">
      <audio controls loop>
        <source src="Images\prettyjohn1-corporate-background-music-corporate-483403.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
      <video controls poster="Images\tech.jpg">
        <source src="Images\1422633-hd_1920_810_24fps.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </article>
  </main>

  <section>
    <h2>Subscribe for Updates</h2>
    <form>
      <input type="email" placeholder="Enter your email" required>
      <button type="submit">Subscribe</button>
      <small>Form uses HTML5 email validation only</small>
    </form>
  </section>

  <footer>
    <p>&copy; 2026 Media Blog Platform</p>
  </footer>

</body>
</html>
